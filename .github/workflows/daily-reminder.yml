name: Tägliche Erinnerungs-Mail
 
on:
  schedule:
    # 06:00 UTC = 08:00 Uhr in Deutschland (Sommerzeit) / 07:00 Uhr (Winterzeit)
    - cron: '0 6 * * *'
  workflow_dispatch: {}
 
jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
 
      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'
 
      - name: Erinnerungs-Skript ausführen
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE }}
          RESEND_API_KEY: ${{ secrets.MAIL }}
          # Resend-Testmodus: ohne verifizierte Domain sind nur Mails an die
          # eigene Resend-Konto-Adresse erlaubt. Für den Versand an andere
          # Empfänger erst eine Domain unter resend.com/domains verifizieren.
          TARGET_EMAIL: 'yaylacioglu@outlook.de'
        run: node scripts/send-reminders.mjs
